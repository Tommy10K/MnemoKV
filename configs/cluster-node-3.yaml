node:
  id: node-3
  mode: clustered
  dataDir: ./data/node-3

network:
  bindAddr: 127.0.0.1
  port: 6383
  maxConnections: 1024
  readTimeoutMs: 30000
  writeTimeoutMs: 30000

engine:
  stripeCount: 32
  memoryLimitBytes: 0
  evictionPolicy: lru

cluster:
  id: demo-cluster
  enabled: true
  shardingEnabled: true
  replicationEnabled: true
  slotCount: 1024
  routingMode: proxy
  failoverMode: manual
  # Automatic-mode settings (unused in manual mode):
  # controller:
  #   controlPort: 7483
  #   raftDir: ./data/node-3/controller
  #   bootstrapNodeId: node-1
  #   observeIntervalMs: 1000
  #   failureTimeoutMs: 10000
  #   consecutiveFailures: 3
  #   rebalanceSkewThreshold: 1
  #   migrationRateLimit: 10
  peers:
    - id: node-1
      address: 127.0.0.1:6381
      apiAddress: 127.0.0.1:7381
    - id: node-2
      address: 127.0.0.1:6382
      apiAddress: 127.0.0.1:7382
    - id: node-3
      address: 127.0.0.1:6383
      apiAddress: 127.0.0.1:7383

# controlPlane:
#   requestSigningSecret: replace-with-a-shared-secret

persistence:
  enabled: true
  dataDir: ./data/node-3
  snapshotIntervalSec: 60
  maxSnapshots: 5
  loadOnStart: true
  format: json                  # json | binary

observability:
  apiBindAddr: 127.0.0.1
  apiPort: 7383
  logLevel: info
