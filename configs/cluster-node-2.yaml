node:
  id: node-2
  mode: clustered
  dataDir: ./data/node-2

network:
  bindAddr: 127.0.0.1
  port: 6382
  maxConnections: 1024
  readTimeoutMs: 30000
  writeTimeoutMs: 30000

engine:
  stripeCount: 32
  memoryLimitBytes: 0
  evictionPolicy: lru

cluster:
  enabled: true
  shardingEnabled: true
  replicationEnabled: true
  autoFailover: true
  writeSafetyMode: async
  peers:
    - id: node-1
      address: 127.0.0.1:6381
    - id: node-2
      address: 127.0.0.1:6382
    - id: node-3
      address: 127.0.0.1:6383

observability:
  apiBindAddr: 127.0.0.1
  apiPort: 7382
  logLevel: info
