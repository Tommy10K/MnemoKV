node:
  id: standalone-persistence-json
  mode: standalone
  dataDir: ./data/standalone-persistence-json

network:
  bindAddr: 127.0.0.1
  port: 6380
  maxConnections: 128
  readTimeoutMs: 30000
  writeTimeoutMs: 30000

engine:
  stripeCount: 16
  memoryLimitBytes: 0
  evictionPolicy: noeviction

cluster:
  enabled: false
  shardingEnabled: false
  replicationEnabled: false
  peers: []

persistence:
  enabled: true
  dataDir: ./data/standalone-persistence-json
  snapshotIntervalSec: 3600
  maxSnapshots: 3
  loadOnStart: true
  format: json

observability:
  apiBindAddr: 127.0.0.1
  apiPort: 7380
  logLevel: info
